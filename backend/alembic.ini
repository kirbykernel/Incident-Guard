# ============================================================
# IncidentGuard — configuração do Alembic
#
# A URL do banco NÃO fica aqui de propósito: seria uma credencial
# em texto plano versionada no git. Ela é lida em migrations/env.py
# a partir do mesmo Settings (.env) que a aplicação usa.
# ============================================================

[alembic]
# Diretório com env.py e as versões de migration
script_location = migrations

# Garante que o pacote "app" é importável quando o alembic roda
# a partir de backend/ (env.py importa os models)
prepend_sys_path = .

# Nome dos arquivos: data + revisão + descrição, para ordenarem
# cronologicamente no diretório
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# --- Logging padrão do Alembic ---
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
