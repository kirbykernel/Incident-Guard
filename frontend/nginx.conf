# ============================================================
# IncidentGuard — nginx.conf.template
# Headers de segurança aplicados por padrão.
#
# Template (não .conf direto): a CSP precisa liberar connect-src para a
# origem real da API, que só é conhecida em runtime (varia entre dev,
# k8s, etc). O entrypoint padrão da imagem nginx roda envsubst sobre
# arquivos em /etc/nginx/templates/*.template automaticamente, usando
# as variáveis de ambiente do container — por isso ${VITE_API_BASE_URL}
# abaixo é resolvido antes do nginx iniciar, sem tooling extra.
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Oculta versão do nginx (reduz surface de ataque)
    server_tokens off;

    # Headers de segurança
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # Health check endpoint (para Kubernetes)
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
    # Proxy da API — mesma origem em todos os ambientes (paridade com o Ingress do k8s)
      location /api/ {
          proxy_pass http://backend:8000;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }
    # SPA: redireciona todas as rotas para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
