apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: incidentguard
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: incidentguard
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend-pod
      app.kubernetes.io/part-of: incidentguard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-pod
        app.kubernetes.io/part-of: incidentguard
    spec:
      containers:
        - name: backend
          image: incidentguard-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: POSTGRES_USER }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: POSTGRES_PASSWORD }
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: POSTGRES_DB }
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
          envFrom:
            - secretRef:
                name: backend-secrets
            - configMapRef:
                name: backend-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
