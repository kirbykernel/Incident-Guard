apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate
  namespace: incidentguard
  labels:
    app.kubernetes.io/name: backend-migrate
    app.kubernetes.io/part-of: incidentguard
spec:
  backoffLimit: 3
  template:
    metadata:
      name: migrate-job
      namespace: incidentguard
      labels:
        app.kubernetes.io/name: backend-migrate
        app.kubernetes.io/part-of: incidentguard
    spec:
      serviceAccountName: backend-migrate
      restartPolicy: OnFailure
      initContainers:
          - name: wait-postgres
            image: incidentguard-backend:v2      # reusa a imagem já presente — sem nova dependência externa
            command: ["sh", "-c", "until python -c 'import socket; socket.create_connection((\"postgres\", 5432), timeout=2)' 2>/dev/null; do echo 'aguardando postgres...'; sleep 2; done"]
            resources:
              requests: { cpu: 50m, memory: 32Mi }
              limits: { memory: 64Mi }
      containers:
        - name: migrate
          image: incidentguard-backend:v2
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: POSTGRES_USER }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: POSTGRES_PASSWORD }
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: POSTGRES_DB }
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
          envFrom:
            - secretRef: 
                name: backend-secrets
            - configMapRef: 
                name: backend-config
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { memory: 256Mi }

            

