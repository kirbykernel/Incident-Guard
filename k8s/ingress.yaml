apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: incidentguard
  namespace: incidentguard 
  labels:
    app.kubernetes.io/name: incidentguard
    app.kubernetes.io/part-of: incidentguard
spec:
  ingressClassName: nginx
  rules:
    - host: incidentguard.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80