apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: incidentguard
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: incidentguard
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend-pod
      app.kubernetes.io/part-of: incidentguard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend-pod
        app.kubernetes.io/part-of: incidentguard
    spec:
      containers:
        - name: frontend
          image: incidentguard-frontend:v2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: VITE_API_BASE_URL
              value: ""
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits: { cpu: 200m, memory: 64Mi }
